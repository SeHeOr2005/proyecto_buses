<!--
  AUTH COMPONENT - Plantilla
  Formulario de Login y Registro con dos paneles deslizantes
  Clase right-panel-active activa el formulario de registro
-->
<div class="auth-page" [class.right-panel-active]="showRegister">
  <div class="container">
    <!-- Panel izquierdo: Formulario de Inicio de Sesión -->
    <div class="form-container sign-in-container">
      <form (ngSubmit)="onLoginSubmit()" class="auth-form">
        <h1>Iniciar Sesión</h1>

        <!-- Botones de login con redes sociales (Google rojo, Microsoft azul, GitHub negro) -->
        <div class="social-login">
          <button type="button" (click)="onSocialLogin('google')" class="btn-social btn-google" title="Google">
            <svg viewBox="0 0 24 24" class="social-icon"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          </button>
          <button type="button" (click)="onSocialLogin('microsoft')" class="btn-social btn-microsoft" title="Microsoft">
            <svg viewBox="0 0 24 24" class="social-icon"><path fill="#f25022" d="M1 1h10v10H1z"/><path fill="#00a4ef" d="M1 13h10v10H1z"/><path fill="#7fba00" d="M13 1h10v10H13z"/><path fill="#ffb900" d="M13 13h10v10H13z"/></svg>
          </button>
          <button type="button" (click)="onSocialLogin('github')" class="btn-social btn-github" title="GitHub">
            <svg viewBox="0 0 24 24" class="social-icon" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          </button>
        </div>

        <!-- Separador entre social y email -->
        <span class="divider-text">o usa tu email</span>

        <!-- Campos de email y contraseña -->
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Email"
          required
        />
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Contraseña"
          required
        />

        <!-- Enlace de recuperación de contraseña -->
        <span class="forgot-link">¿Olvidaste tu contraseña?</span>

        <!-- Mensaje de error si el login falla -->
        <div class="error-alert" *ngIf="errorMessage">{{ errorMessage }}</div>

        <!-- Botón de enviar login -->
        <button type="submit" class="btn-primary">INICIAR SESIÓN</button>
      </form>
    </div>

    <!-- Panel derecho: Formulario de Registro -->
    <div class="form-container sign-up-container">
      <form (ngSubmit)="onRegisterSubmit()" class="auth-form">
        <h1>Crear cuenta</h1>

        <!-- Nombre y apellido (obligatorios; se valida al enviar) -->
        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          placeholder="Nombre"
        />
        <input
          type="text"
          [(ngModel)]="regLastName"
          name="regLastName"
          placeholder="Apellido"
        />
        <!-- Email -->
        <input
          type="email"
          [(ngModel)]="regEmail"
          name="regEmail"
          placeholder="Email"
        />
        <!-- Contraseña con indicador de fortaleza -->
        <input
          type="password"
          [(ngModel)]="regPassword"
          name="regPassword"
          placeholder="Contraseña (mín. 8 caracteres, may., min., número, especial)"
        />
        <div class="password-strength" [class.visible]="regPassword.length > 0">
          <div class="strength-bar">
            <span class="strength-fill" [class.weak]="getRegPasswordStrength(regPassword) === 'weak'" [class.medium]="getRegPasswordStrength(regPassword) === 'medium'" [class.strong]="getRegPasswordStrength(regPassword) === 'strong'" [style.width.%]="getRegPasswordStrength(regPassword) === 'weak' ? 33 : getRegPasswordStrength(regPassword) === 'medium' ? 66 : 100"></span>
          </div>
          <span class="strength-label" [class.weak]="getRegPasswordStrength(regPassword) === 'weak'" [class.medium]="getRegPasswordStrength(regPassword) === 'medium'" [class.strong]="getRegPasswordStrength(regPassword) === 'strong'">{{ getRegStrengthLabel(regPassword) }}</span>
        </div>
        <!-- Confirmación de contraseña -->
        <input
          type="password"
          [(ngModel)]="regConfirmPassword"
          name="regConfirmPassword"
          placeholder="Confirmar contraseña"
        />

        <!-- Mensaje de error en registro -->
        <div class="error-alert" *ngIf="regErrorMessage">{{ regErrorMessage }}</div>
        <!-- Mensaje de éxito en registro -->
        <div class="success-alert" *ngIf="regSuccessMessage">{{ regSuccessMessage }}</div>

        <!-- Botón de enviar registro -->
        <button type="submit" class="btn-primary btn-register" [disabled]="isRegistering">
          {{ isRegistering ? 'Registrando...' : 'REGISTRAR' }}
        </button>
      </form>
    </div>

    <!-- Overlay morado con botones para cambiar entre login y registro -->
    <div class="overlay-container">
      <div class="overlay">
        <!-- Panel izquierdo del overlay: CTA para volver al login -->
        <div class="overlay-panel overlay-left">
          <h1>¡Bienvenido!</h1>
          <p>Inicia sesión con tu cuenta</p>
          <button type="button" (click)="togglePanel()" class="btn-ghost">Iniciar Sesión</button>
        </div>
        <!-- Panel derecho del overlay: CTA para ir a registro -->
        <div class="overlay-panel overlay-right">
          <h1>¡Hola!</h1>
          <p>Crear tu cuenta</p>
          <button type="button" (click)="togglePanel()" class="btn-ghost">Registrar</button>
        </div>
      </div>
    </div>
  </div>
</div>
