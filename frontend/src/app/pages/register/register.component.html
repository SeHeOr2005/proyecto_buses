<div class="register-page">
  <div class="register-form-section">
    <div class="register-card">
      <h1 class="register-title">BusTrack</h1>
      <h2>Crear cuenta</h2>
      <p class="subtitle">Complete el formulario para registrarse</p>

      <form (ngSubmit)="onSubmit()" class="register-form">
        <div class="form-group">
          <label for="name">Nombre completo</label>
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="name"
            required
            placeholder="Juan Pérez"
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="usuario&#64;empresa.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            required
            placeholder="Repita la contraseña"
            autocomplete="new-password"
          />
        </div>

        @if (errorMessage) {
          <div class="error-alert">{{ errorMessage }}</div>
        }

        @if (successMessage) {
          <div class="success-alert">{{ successMessage }}</div>
        }

        <button type="submit" class="btn-register">
          Registrarse
        </button>
      </form>

      <p class="login-link">
        ¿Ya tiene cuenta? <a routerLink="/login">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>
