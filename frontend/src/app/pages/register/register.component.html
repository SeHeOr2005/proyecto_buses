<div class="register-page">
  <div class="register-form-section">
    <div class="register-card">
      <h1 class="register-title">BusTrack</h1>
      <h2>Crear cuenta</h2>
      <p class="subtitle">Complete el formulario para registrarse</p>

      <form (ngSubmit)="onSubmit()" class="register-form">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="name"
            required
            placeholder="Juan"
            autocomplete="given-name"
          />
        </div>

        <div class="form-group">
          <label for="lastName">Apellido</label>
          <input
            type="text"
            id="lastName"
            name="lastName"
            [(ngModel)]="lastName"
            required
            placeholder="Pérez"
            autocomplete="family-name"
          />
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="usuario&#64;empresa.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="Mín. 8 caracteres, mayúscula, minúscula, número y carácter especial"
            autocomplete="new-password"
          />
          <div class="password-strength" [class.visible]="password.length > 0">
            <div class="strength-bar">
              <span class="strength-fill" [class.weak]="getPasswordStrength(password) === 'weak'" [class.medium]="getPasswordStrength(password) === 'medium'" [class.strong]="getPasswordStrength(password) === 'strong'" [style.width.%]="getPasswordStrength(password) === 'weak' ? 33 : getPasswordStrength(password) === 'medium' ? 66 : 100"></span>
            </div>
            <span class="strength-label" [class.weak]="getPasswordStrength(password) === 'weak'" [class.medium]="getPasswordStrength(password) === 'medium'" [class.strong]="getPasswordStrength(password) === 'strong'">{{ getStrengthLabel(password) }}</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            required
            placeholder="Repita la contraseña"
            autocomplete="new-password"
          />
        </div>

        <div class="error-alert" *ngIf="errorMessage">{{ errorMessage }}</div>

        <div class="success-alert" *ngIf="successMessage">{{ successMessage }}</div>

        <button type="submit" class="btn-register" [disabled]="isRegistering">
          {{ isRegistering ? 'Registrando...' : 'Registrarse' }}
        </button>
      </form>

      <p class="login-link">
        ¿Ya tiene cuenta? <a routerLink="/login">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>
