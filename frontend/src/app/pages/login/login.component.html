<div class="login-page">
  <div class="login-form-section">
    <div class="login-card">
      <h1 class="login-title">BusTrack</h1>
      <h2>Acceso al sistema</h2>
      <p class="subtitle">Ingrese sus credenciales para continuar</p>

      <div class="social-login">
        <button type="button" (click)="onSocialLogin('google')" class="btn-social btn-google">
          Google
        </button>
        <button type="button" (click)="onSocialLogin('microsoft')" class="btn-social btn-microsoft">
          Microsoft
        </button>
        <button type="button" (click)="onSocialLogin('github')" class="btn-social btn-github">
          GitHub
        </button>
      </div>

      <div class="divider">
        <span>o ingrese con email</span>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="usuario&#64;empresa.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        @if (errorMessage) {
          <div class="error-alert">{{ errorMessage }}</div>
        }

        <button type="submit" class="btn-login">
          Iniciar sesión
        </button>
      </form>

      <p class="demo-hint">Demo: admin&#64;test.com / 123456</p>

      <p class="register-link">
        ¿No tiene cuenta? <a routerLink="/registro">Registrarse</a>
      </p>
    </div>
  </div>
</div>
