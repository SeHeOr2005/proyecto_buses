# MongoDB - desde cualquier dispositivo (Atlas) o local
# Opción 1 - Atlas (nube): crea cluster en https://cloud.mongodb.com y pega aquí tu URI
# Opción 2 - Variable de entorno: define MONGODB_URI con tu URI de Atlas
# Opción 3 - Local: si no defines nada, usa localhost
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bustrack}
