spring.application.name=ms-security
server.port=8080

# MongoDB - misma base de datos que el backend original
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bustrack}
spring.data.mongodb.database=${MONGODB_DATABASE:bustrack}
# No bloquear el arranque si MongoDB no está disponible inmediatamente
spring.data.mongodb.auto-index-creation=false
# Reducir timeout de conexión para no esperar 30s al arrancar
spring.data.mongodb.connection-timeout=5000

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnough}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Microservicio de notificaciones
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:5000}

# OAuth2 Google
# URIs de redirección autorizados en Google Console: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=241641682159-adou9tf8geumnsjpr9q8fdmlfgeetpnn.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# OAuth2 GitHub
# Callback URL en GitHub: http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-id=Ov23ligZM0UoBxmlXOSG
spring.security.oauth2.client.registration.github.client-secret=d848a76d7025f0311ca6f2ca08322dd23fc05aa2
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github

# Sesión (necesaria para el flujo OAuth2)
server.servlet.session.timeout=30m
server.servlet.session.cookie.path=/
server.servlet.session.cookie.same-site=lax

# Frontend
frontend.url=http://localhost:4200
